# .github/workflows/deploy.yml
name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://asset-management-api-40nt.onrender.com/api
          VITE_ALPHA_VANTAGE_KEY: Y6ZGNM36NIYQ7VY0

      - name: Create 404 fallback for SPA
        run: cp dist/index.html dist/404.html
           

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          commit-message: "Deploy site from ${{ github.repository }}@${{ github.sha }}"
          token: ${{ secrets.GITHUB_TOKEN }}